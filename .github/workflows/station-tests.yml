name: Station Tests (PyQt5)

on:
  push:
    branches: [main, develop]
    paths:
      - 'station/**'
      - '.github/workflows/station-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'station/**'
  workflow_dispatch:

jobs:
  pytest:
    name: pytest station/tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: station

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'station/requirements.txt'

      - name: System deps for PyQt5
        run: sudo apt-get update && sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3

      - name: Install Python deps (subset apto para CI)
        run: |
          pip install --upgrade pip
          pip install pytest pytest-qt PyQt5
          pip install sqlalchemy bcrypt python-dotenv supabase requests
          pip install numpy opencv-python-headless Pillow

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          if [ -d tests ] && [ -n "$(ls -A tests 2>/dev/null)" ]; then
            pytest tests -v --tb=short
          else
            echo "No hay tests todavia — skipping."
          fi
