name: Supabase Cloud Sync Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  supabase-verify:
    name: Supabase Schema Validator (SaaS multitenant)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install "supabase>=2.3.0" "python-dotenv>=1.0.0"

      - name: Ejecutar verificacion de schema
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_KEY}" ]; then
            echo "Secretos SUPABASE_URL/SUPABASE_KEY no configurados — skipping."
            exit 0
          fi
          python scripts/supabase_sync_check.py
