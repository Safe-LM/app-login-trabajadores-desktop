name: CI - Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias de lint
        run: pip install flake8 pyflakes

      - name: Verificar sintaxis Python (station)
        run: |
          echo "Verificando sintaxis station/..."
          python -m py_compile station/src/main.py
          python -m py_compile station/src/utils/database.py
          python -m py_compile station/src/utils/auth.py
          python -m py_compile station/src/utils/models.py
          python -m py_compile station/src/utils/employee_mapper.py
          echo "Sintaxis correcta"

      - name: Lint con flake8
        run: |
          flake8 station/src/ tools/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --max-line-length=150 \
            --exclude=__pycache__,venv,.git

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Bandit
        run: pip install bandit

      - name: Escaneo de seguridad con Bandit
        run: |
          echo "Iniciando escaneo de seguridad..."
          bandit -r station/src/ tools/ -ll -ii
          echo "OK"

  dependencies:
    name: Verificar Dependencias
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar deps minimas (subset apto para CI)
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless numpy sqlalchemy bcrypt python-dotenv supabase requests

      - name: Verificar imports principales
        run: |
          python -c "import cv2; print(f'OpenCV {cv2.__version__}')"
          python -c "import numpy; print(f'NumPy {numpy.__version__}')"
          python -c "import sqlalchemy; print(f'SQLAlchemy {sqlalchemy.__version__}')"
          python -c "import bcrypt; print('bcrypt OK')"
          echo "Todas las dependencias verificadas"

  structure:
    name: Verificar Estructura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Verificar archivos criticos (arquitectura SaaS)
        run: |
          echo "Verificando estructura del proyecto..."
          files=(
            "station/src/main.py"
            "station/src/utils/database.py"
            "station/src/utils/face_recognition_opencv.py"
            "station/src/utils/hybrid_opencv_gemini_matcher.py"
            "station/src/windows/login_window.py"
            "station/src/windows/dashboard_window.py"
            "station/requirements.txt"
            "station/run_station.py"
            "web-panel/package.json"
            "supabase/migrations/20260429_multitenant_saas_v1.sql"
          )
          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Falta: $file"
              exit 1
            else
              echo "OK $file"
            fi
          done
          echo ""
          echo "Estructura del proyecto correcta"

      - name: Verificar carpetas de la arquitectura
        run: |
          for d in station/src/utils station/src/windows station/frontend web-panel/src supabase/migrations supabase/functions; do
            if [ -d "$d" ]; then
              echo "OK $d"
            else
              echo "Falta: $d"
              exit 1
            fi
          done
