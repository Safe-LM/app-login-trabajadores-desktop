name: Station Installer (Windows .exe)

# Compila el bundle PyInstaller + frontend React + instalador NSIS.
#
# Triggers:
#   - Push a main: build de validacion (artifact 30d, NO crea release)
#   - PR a main: validar que el build sigue funcionando
#   - Push de tag station-v*: build de release (publica en GitHub Releases)
#   - Manual (workflow_dispatch): pruebas con version custom

on:
  push:
    branches: [main]
    paths:
      - 'station/**'
      - '.github/workflows/station-installer.yml'
    tags:
      - 'station-v*'
  pull_request:
    branches: [main]
    paths:
      - 'station/**'
      - '.github/workflows/station-installer.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ej. 5.1.0)'
        required: true
        default: '5.1.0'

jobs:
  build:
    name: Build instalador Windows
    runs-on: windows-latest
    permissions:
      contents: write   # para crear release y subir assets

    steps:
      - uses: actions/checkout@v4

      # ─── Calcular version segun trigger ────────────────────────────
      # - Tag station-v5.1.0    -> 5.1.0          (release oficial)
      # - workflow_dispatch     -> input.version  (prueba manual)
      # - push a main / PR      -> 0.0.0-{sha}    (build de validacion)
      - name: Calcular version
        id: version
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ github.event.inputs.version }}"
            $isRelease = "true"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}".Replace("station-v", "")
            $isRelease = "true"
          } else {
            # Push a main o PR: version efimera para validar build
            $v = "0.0.0-$sha"
            $isRelease = "false"
          }
          Write-Output "version=$v" >> $env:GITHUB_OUTPUT
          Write-Output "is_release=$isRelease" >> $env:GITHUB_OUTPUT
          Write-Output "Version: $v (release: $isRelease)"

      # ─── Setup ─────────────────────────────────────────────────────
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'station/requirements.txt'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'station/frontend/package-lock.json'

      # ─── Build frontend (Vite -> dist) ─────────────────────────────
      # Usamos 'npm install' en lugar de 'npm ci' para tolerar desincronia
      # entre package.json y package-lock.json (caso comun cuando devs
      # actualizan deps sin commitear el lock). En produccion reproducible
      # esto se reemplazaria por 'npm ci' tras commitear el lock al dia.
      - name: Build frontend (Vite)
        working-directory: station/frontend
        run: |
          npm install --no-audit --no-fund
          npm run build

      # ─── Build Python (PyInstaller) ────────────────────────────────
      - name: Install Python deps
        working-directory: station
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Descargar modelos ONNX
        working-directory: station
        run: |
          if (Test-Path "download_models.py") {
            python download_models.py
          } else {
            Write-Output "No hay download_models.py — modelos se obtendran en runtime"
          }
        continue-on-error: true

      - name: Compilar bundle con PyInstaller
        working-directory: station
        run: pyinstaller SafeLink_Station.spec --noconfirm --clean

      - name: Verificar bundle
        working-directory: station
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\SafeLink_Station\SafeLink_Station.exe")) {
            Write-Error "Bundle no generado correctamente"
            exit 1
          }
          $size = (Get-Item "dist\SafeLink_Station").GetFiles("*", "AllDirectories") | Measure-Object Length -Sum
          $mb = [math]::Round($size.Sum / 1MB, 1)
          Write-Output "Bundle generado: $mb MB"

      # ─── Build instalador NSIS ─────────────────────────────────────
      # Choco actualiza el PATH del proceso pero no del step actual.
      # Por eso despues de instalar agregamos la ruta de makensis al
      # GITHUB_PATH para que los siguientes steps lo encuentren.
      - name: Instalar NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Persistir la ruta al PATH del workflow
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (-not (Test-Path "$nsisPath\makensis.exe")) {
            # Algunos runners lo instalan en otra ruta — buscar dinamicamente
            $found = Get-ChildItem -Path "C:\" -Recurse -Filter "makensis.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $nsisPath = Split-Path $found.FullName -Parent }
          }
          Write-Output "NSIS instalado en: $nsisPath"
          Add-Content -Path $env:GITHUB_PATH -Value $nsisPath
          # Verificar
          & "$nsisPath\makensis.exe" /VERSION

      - name: Compilar instalador NSIS
        working-directory: station/installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          # Sobrescribir APP_VERSION del .nsi con el valor de CI
          makensis /DAPP_VERSION=$version installer.nsi
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Compilacion NSIS fallo"
            exit 1
          }
          Get-ChildItem *.exe

      # ─── Generar metadatos para auto-update ────────────────────────
      - name: Generar version.txt y SHA256SUMS.txt
        working-directory: station/installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $exe = "SafeLinkStation_Setup_$version.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Instalador $exe no encontrado"
            exit 1
          }
          # version.txt: solo la version (lo lee auto_updater.py)
          Set-Content -Path "version.txt" -Value $version -NoNewline
          # SHA256SUMS.txt para verificar integridad de la descarga
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "SHA256SUMS.txt" -Value "$hash  $exe"
          Write-Output "version.txt -> $version"
          Write-Output "SHA256SUMS.txt -> $hash  $exe"

      # ─── Upload artifacts (siempre, util para PRs sin tag) ─────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeLinkStation-${{ steps.version.outputs.version }}-windows
          path: |
            station/installer/SafeLinkStation_Setup_*.exe
            station/installer/version.txt
            station/installer/SHA256SUMS.txt
          retention-days: 30

      # ─── Calcular tamano del .exe + leer hash para mostrar en notas ─
      - name: Preparar metadatos del release
        if: startsWith(github.ref, 'refs/tags/station-v')
        id: meta
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $exe = Get-Item "station/installer/SafeLinkStation_Setup_$version.exe"
          $sizeMB = [math]::Round($exe.Length / 1MB, 1)
          $hash = (Get-Content "station/installer/SHA256SUMS.txt" -Raw).Split()[0]
          $buildDate = Get-Date -Format "yyyy-MM-dd"
          Write-Output "size_mb=$sizeMB" >> $env:GITHUB_OUTPUT
          Write-Output "sha256=$hash" >> $env:GITHUB_OUTPUT
          Write-Output "build_date=$buildDate" >> $env:GITHUB_OUTPUT

      # ─── Release a GitHub (solo en push de tag) ────────────────────
      - name: Crear/actualizar GitHub Release
        if: startsWith(github.ref, 'refs/tags/station-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 🚀 Safe Link Station v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            station/installer/SafeLinkStation_Setup_*.exe
            station/installer/version.txt
            station/installer/SHA256SUMS.txt
          body: |
            > Safe Link Station — versión `${{ steps.version.outputs.version }}` publicada el `${{ steps.meta.outputs.build_date }}`
            > Build SHA: `${{ github.sha }}`

            ## 📥 Descargar

            | Plataforma | Archivo | Tamaño | SHA256 |
            |---|---|---|---|
            | 🪟 Windows 10/11 (x64) | [`SafeLinkStation_Setup_${{ steps.version.outputs.version }}.exe`](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/SafeLinkStation_Setup_${{ steps.version.outputs.version }}.exe) | ${{ steps.meta.outputs.size_mb }} MB | `${{ steps.meta.outputs.sha256 }}` |

            ## 🚀 Instalación rápida

            1. Descarga `SafeLinkStation_Setup_${{ steps.version.outputs.version }}.exe`
            2. Doble click → "Más información" → "Ejecutar de todas formas"
            3. Sigue el wizard (3 minutos)
            4. Copia tu API Key del [panel web](https://panel.safelink.app)

            📖 **Manual completo:** [docs/MANUAL_INSTALACION.md](https://github.com/${{ github.repository }}/blob/main/docs/MANUAL_INSTALACION.md)

            ## 🔍 Verificar integridad de la descarga

            ```powershell
            certutil -hashfile SafeLinkStation_Setup_${{ steps.version.outputs.version }}.exe SHA256
            ```

            Compara con: `${{ steps.meta.outputs.sha256 }}`

            ## 🔄 Actualización automática

            Las estaciones existentes detectarán esta versión en los próximos
            15 segundos del próximo arranque y notificarán al admin en el panel
            (sección **Notificaciones**) para confirmar la actualización.

            Para desactivar auto-update agrega a tu `.env`:
            ```
            AUTO_UPDATE_ENABLED=false
            ```

            ## 📝 Cambios

            <!-- generate_release_notes:true rellena esta seccion automaticamente con
                 los commits + PRs desde el ultimo tag categorizados por type. -->

            ---

            <details>
            <summary>🛠️ Información técnica del build</summary>

            - **Commit**: [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - **Build date**: `${{ steps.meta.outputs.build_date }}`
            - **Workflow run**: [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Compare**: [previo...${{ github.ref_name }}](https://github.com/${{ github.repository }}/compare/main...${{ github.ref_name }})

            </details>

            ---

            ⚠️ **Sin firma digital**: el `.exe` no está firmado con un certificado
            (cuando crezcamos a +50 clientes lo agregamos). Windows mostrará "Editor
            desconocido" — es normal, click en "Más información" → "Ejecutar".

            🐛 ¿Encontraste un bug? [Reporta en Issues](https://github.com/${{ github.repository }}/issues/new)

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
