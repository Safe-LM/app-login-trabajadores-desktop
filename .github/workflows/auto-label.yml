name: Auto Label PR

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  label:
    name: 🏷️ Auto-etiquetar PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Etiquetar según branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const labels = [];

            if (branch.startsWith('feature/')) labels.push('enhancement');
            if (branch.startsWith('fix/'))     labels.push('bug');
            if (branch.startsWith('docs/'))    labels.push('documentation');
            if (branch.startsWith('refactor/')) labels.push('refactor');
            if (branch.startsWith('perf/'))    labels.push('performance');
            if (branch.startsWith('style/'))   labels.push('style');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels
              });
              console.log(`Labels añadidos: ${labels.join(', ')}`);
            } else {
              console.log(`Branch "${branch}" no tiene prefijo reconocido`);
            }
