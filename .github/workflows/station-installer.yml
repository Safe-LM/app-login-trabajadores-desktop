name: Station Installer (Windows .exe)

# Compila el bundle PyInstaller + frontend React + instalador NSIS.
#
# Triggers:
#   - release.published (station-v*): el caso REAL de produccion.
#     release-please mergea su PR -> crea tag -> publica release ->
#     nosotros enganchamos a 'release.published' para compilar y
#     adjuntar el .exe al release que ya existe.
#   - Push de tag station-v* manual: compatibilidad con tags creados
#     a mano (git tag + git push)
#   - PR a main: validar que el build sigue funcionando
#   - Manual (workflow_dispatch): pruebas con version custom
#
# IMPORTANTE: NO usamos 'push.branches: main' porque combinar tags +
# paths en el mismo push hace que GitHub aplique el filtro a los tags.
# Y NO podemos depender SOLO de 'push.tags' porque cuando release-please
# crea el tag con GITHUB_TOKEN, GitHub NO dispara workflows (medida
# anti-loop). Por eso usamos 'release.published' como trigger principal.

on:
  # release.published: caso real de produccion. release-please publica
  # el release -> nosotros enganchamos para compilar y adjuntar el .exe.
  release:
    types: [published]

  # Push de tag manual (git tag + git push). Mantenido por compatibilidad.
  push:
    tags:
      - 'station-v*'

  # Manual: pruebas con version custom o re-publicar release sin tag
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ej. 5.1.0)'
        required: true
        default: '5.1.0'

# Cancelar runs anteriores del mismo flujo (ahorra minutos de Windows).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build instalador Windows
    runs-on: windows-latest
    permissions:
      contents: write   # para crear release y subir assets

    steps:
      - uses: actions/checkout@v4
        with:
          # Necesitamos historia completa de tags + ramas para que el
          # script de release notes pueda extraer el CHANGELOG actualizado
          # por release-please. Si solo cloneamos la HEAD por defecto
          # (depth: 1) podemos perder commits del PR de release-please
          # que actualizo CHANGELOG.md hace segundos.
          fetch-depth: 0
          # Clonar la rama main (donde release-please ya mergeo el CHANGELOG)
          # explicitamente, en vez del SHA default del workflow run
          ref: main

      # ─── Calcular version segun trigger ────────────────────────────
      # - release.published     -> tag_name del release (caso real prod)
      # - Tag station-v5.1.0    -> 5.1.0 (release oficial via push tag)
      # - workflow_dispatch     -> input.version (prueba manual)
      # - PR                    -> 0.0.0-{sha} (build de validacion)
      - name: Calcular version
        id: version
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)
          $eventName = "${{ github.event_name }}"
          if ($eventName -eq "release") {
            $tag = "${{ github.event.release.tag_name }}"
            $v = $tag.Replace("station-v", "")
            $tagName = $tag
            $isRelease = "true"
          } elseif ($eventName -eq "workflow_dispatch") {
            $v = "${{ github.event.inputs.version }}"
            $tagName = "station-v$v"
            $isRelease = "true"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}".Replace("station-v", "")
            $tagName = "${{ github.ref_name }}"
            $isRelease = "true"
          } else {
            # PR: version efimera para validar build
            $v = "0.0.0-$sha"
            $tagName = ""
            $isRelease = "false"
          }
          Write-Output "version=$v" >> $env:GITHUB_OUTPUT
          Write-Output "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          Write-Output "is_release=$isRelease" >> $env:GITHUB_OUTPUT
          Write-Output "Version: $v (tag: $tagName, release: $isRelease)"

      # ─── Setup ─────────────────────────────────────────────────────
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'station/requirements.txt'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'station/frontend/package-lock.json'

      # ─── Build frontend (Vite -> dist) ─────────────────────────────
      # Usamos 'npm install' en lugar de 'npm ci' para tolerar desincronia
      # entre package.json y package-lock.json (caso comun cuando devs
      # actualizan deps sin commitear el lock). En produccion reproducible
      # esto se reemplazaria por 'npm ci' tras commitear el lock al dia.
      - name: Build frontend (Vite)
        working-directory: station/frontend
        run: |
          npm install --no-audit --no-fund
          npm run build

      # ─── Build Python (PyInstaller) ────────────────────────────────
      - name: Install Python deps
        working-directory: station
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Descargar modelos ONNX
        working-directory: station
        run: |
          if (Test-Path "download_models.py") {
            python download_models.py
          } else {
            Write-Output "No hay download_models.py — modelos se obtendran en runtime"
          }
        continue-on-error: true

      - name: Validar modelos ONNX presentes en el bundle
        working-directory: station
        shell: pwsh
        run: |
          $modelsDir = "models"
          $expected  = @(
            "face_detection_yunet_2023mar.onnx",
            "face_recognition_sface_2021dec.onnx"
          )
          $missing = @()
          foreach ($m in $expected) {
            $p = Join-Path $modelsDir $m
            if (-not (Test-Path $p)) {
              $missing += $m
            } else {
              $size = (Get-Item $p).Length
              Write-Output ("OK: {0} ({1:N0} bytes)" -f $m, $size)
            }
          }
          if ($missing.Count -gt 0) {
            Write-Warning ("Modelos ausentes (se descargaran en runtime al primer arranque): {0}" -f ($missing -join ", "))
            # No fallamos el build — la app puede descargarlos en runtime
            # gracias a model_downloader.py + utils/paths.models_root().
            # Pero dejamos el warning visible para que se note en CI logs.
          }

      # Inyectar version + commit + fecha en build_info.py (lo lee la app
      # al arrancar y lo muestra en logs / acerca de / heartbeat)
      - name: Inyectar build info
        working-directory: station
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $sha     = "${{ github.sha }}".Substring(0, 7)
          $run     = "${{ github.run_number }}"
          python inject_build_info.py --version $version --sha $sha --run $run

      - name: Compilar bundle con PyInstaller
        working-directory: station
        run: pyinstaller SafeLink_Station.spec --noconfirm --clean

      - name: Verificar bundle
        working-directory: station
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\SafeLink_Station\SafeLink_Station.exe")) {
            Write-Error "Bundle no generado correctamente"
            exit 1
          }
          $size = (Get-Item "dist\SafeLink_Station").GetFiles("*", "AllDirectories") | Measure-Object Length -Sum
          $mb = [math]::Round($size.Sum / 1MB, 1)
          Write-Output "Bundle generado: $mb MB"

      # ─── Build instalador NSIS ─────────────────────────────────────
      # Choco actualiza el PATH del proceso pero no del step actual.
      # Por eso despues de instalar agregamos la ruta de makensis al
      # GITHUB_PATH para que los siguientes steps lo encuentren.
      - name: Instalar NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Persistir la ruta al PATH del workflow
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (-not (Test-Path "$nsisPath\makensis.exe")) {
            # Algunos runners lo instalan en otra ruta — buscar dinamicamente
            $found = Get-ChildItem -Path "C:\" -Recurse -Filter "makensis.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $nsisPath = Split-Path $found.FullName -Parent }
          }
          Write-Output "NSIS instalado en: $nsisPath"
          Add-Content -Path $env:GITHUB_PATH -Value $nsisPath
          # Verificar
          & "$nsisPath\makensis.exe" /VERSION

      - name: Compilar instalador NSIS
        working-directory: station/installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          # Sobrescribir APP_VERSION del .nsi con el valor de CI
          makensis /DAPP_VERSION=$version installer.nsi
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Compilacion NSIS fallo"
            exit 1
          }
          Get-ChildItem *.exe

      # ─── Generar metadatos para auto-update ────────────────────────
      - name: Generar version.txt y SHA256SUMS.txt
        working-directory: station/installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $exe = "SafeLinkStation_Setup_$version.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Instalador $exe no encontrado"
            exit 1
          }
          # version.txt: solo la version (lo lee auto_updater.py)
          Set-Content -Path "version.txt" -Value $version -NoNewline
          # SHA256SUMS.txt para verificar integridad de la descarga
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "SHA256SUMS.txt" -Value "$hash  $exe"
          Write-Output "version.txt -> $version"
          Write-Output "SHA256SUMS.txt -> $hash  $exe"

      # ─── Upload artifacts (siempre, util para PRs sin tag) ─────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeLinkStation-${{ steps.version.outputs.version }}-windows
          path: |
            station/installer/SafeLinkStation_Setup_*.exe
            station/installer/version.txt
            station/installer/SHA256SUMS.txt
          retention-days: 30

      # ─── Generar release notes inteligentes ────────────────────────
      # Llamamos al script generate_release_body.py que detecta:
      #  - BREAKING CHANGES (commits con !) -> banner rojo
      #  - Cambios al installer -> banner naranja
      #  - Cambios a station/web-panel -> seccion "Para usuarios..."
      #  - Estadisticas (commits, contribuidores)
      #  - Tabla de descarga con tamano + SHA256
      #  - Cambios extraidos del CHANGELOG.md generado por release-please
      - name: Generar release notes inteligentes
        if: steps.version.outputs.is_release == 'true'
        id: notes
        shell: pwsh
        run: |
          # Necesitamos historia completa para git log con tags
          git fetch --tags --unshallow 2>$null
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag_name }}"
          # Tag anterior (puede no existir si es el primer release)
          $previousTag = (git tag --list "station-v*" --sort=-v:refname |
                          Where-Object { $_ -ne $tag } |
                          Select-Object -First 1)
          if (-not $previousTag) { $previousTag = "" }
          Write-Output "Previous tag: $previousTag"

          python .github/scripts/generate_release_body.py `
            --version "$version" `
            --tag "$tag" `
            --previous-tag "$previousTag" `
            --installer-path "station/installer/SafeLinkStation_Setup_$version.exe" `
            --sha256-file "station/installer/SHA256SUMS.txt" `
            --commit-sha "${{ github.sha }}" `
            --build-run-id "${{ github.run_id }}" `
            --repo "${{ github.repository }}" `
            --changelog-path "station/CHANGELOG.md" `
            --output release_body.md

          Write-Output "body_path=release_body.md" >> $env:GITHUB_OUTPUT

      # ─── Adjuntar .exe al GitHub Release ────────────────────────────
      # Si el release ya existe (caso normal: release-please lo creo),
      # actualizamos el body y agregamos los assets.
      # Si NO existe (caso: tag pusheado a mano), softprops lo crea.
      - name: Crear/actualizar GitHub Release
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: 🚀 Safe Link Station v${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.body_path }}
          # generate_release_notes:false porque ya generamos el body
          # con nuestro script (mas rico y contextual)
          generate_release_notes: false
          files: |
            station/installer/SafeLinkStation_Setup_*.exe
            station/installer/version.txt
            station/installer/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
