name: Notify Panel — New Release

# Cuando se publica un release station-v* o web-panel-v*, inserta
# una notificacion en la tabla 'notificaciones' de Supabase para CADA
# empresa con estaciones registradas. El tipo de notificacion varia
# segun el componente para que el admin del panel sepa que actualizar:
#
#   station-v*    -> tipo: system_release_available (severidad: info)
#                    "Nueva version de la estacion disponible"
#   web-panel-v*  -> tipo: panel_release_available  (severidad: info)
#                    "El panel se actualizo con mejoras"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      component:
        description: 'Componente'
        required: true
        type: choice
        options:
          - station
          - web-panel
      version:
        description: 'Version del release (ej. 5.2.0)'
        required: true

permissions:
  contents: read

jobs:
  notify:
    name: Notificar a empresas via Supabase
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'station-v') ||
      startsWith(github.event.release.tag_name, 'web-panel-v')
    steps:
      - uses: actions/checkout@v4

      - name: Detectar componente y version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            component="${{ github.event.inputs.component }}"
            version="${{ github.event.inputs.version }}"
            tag="${component}-v${version}"
          else
            tag="${{ github.event.release.tag_name }}"
            if [[ "$tag" == station-v* ]]; then
              component="station"
              version="${tag#station-v}"
            elif [[ "$tag" == web-panel-v* ]]; then
              component="web-panel"
              version="${tag#web-panel-v}"
            else
              echo "Tag desconocido: $tag — skipping"
              exit 0
            fi
          fi
          echo "component=$component" >> $GITHUB_OUTPUT
          echo "version=$version"     >> $GITHUB_OUTPUT
          echo "tag=$tag"              >> $GITHUB_OUTPUT
          echo "Componente: $component, version: $version, tag: $tag"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install supabase-py
        run: pip install "supabase>=2.3.0"

      - name: Insertar notificacion para todas las empresas
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COMPONENT: ${{ steps.ver.outputs.component }}
          VERSION:   ${{ steps.ver.outputs.version }}
          TAG:       ${{ steps.ver.outputs.tag }}
          REPO:      ${{ github.repository }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Secrets SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY no configurados — skipping"
            exit 0
          fi
          python .github/scripts/notify_release.py
