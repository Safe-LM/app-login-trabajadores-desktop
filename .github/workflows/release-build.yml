name: Release - Versioning

# Release-please genera el changelog y crea releases automaticas via
# Conventional Commits. La compilacion del .exe la hace
# station-build-windows.yml cuando se pushea un tag station-v*.

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python
