name: Supabase Migration Validator

on:
  push:
    branches: [main, develop]
    paths:
      - 'supabase/migrations/**.sql'
      - 'supabase/migrations/.baseline'
      - '.github/workflows/migration-validator.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'supabase/migrations/**.sql'
      - 'supabase/migrations/.baseline'
  workflow_dispatch:

jobs:
  validate-sql:
    name: Parse + dry-run en Postgres efimero
    runs-on: ubuntu-latest

    services:
      postgres:
        # Imagen con pgvector preinstalado — evita tener que apt-get el
        # paquete postgresql-15-pgvector (que no existe en repos default
        # de Ubuntu Noble). pgvector/pgvector:pg15 es la imagen oficial.
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Instalar cliente psql
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Habilitar extensiones + bootstrap de tablas base
        run: |
          # Crear extensiones requeridas (pgvector ya esta instalado en
          # la imagen, solo hay que CREATE EXTENSION).
          PGPASSWORD=postgres psql -h localhost -U postgres -d testdb <<'SQL'
          CREATE EXTENSION IF NOT EXISTS vector;
          CREATE EXTENSION IF NOT EXISTS pgcrypto;

          -- Roles que Supabase crea automaticamente en su instancia.
          -- En un Postgres vanilla no existen — los creamos como NOLOGIN
          -- para que GRANT ... TO authenticated / service_role no falle.
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role NOLOGIN BYPASSRLS;
            END IF;
          END $$;

          -- Esquema auth con tabla minima de users + funciones que
          -- Supabase provee en su instancia real (auth.jwt(), auth.uid()).
          -- Aqui las mockeamos para que las migraciones que las usan en
          -- politicas RLS no fallen al validar.
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            email text
          );
          CREATE OR REPLACE FUNCTION auth.jwt() RETURNS jsonb
            LANGUAGE sql STABLE AS $func$
              SELECT '{}'::jsonb
            $func$;
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid
            LANGUAGE sql STABLE AS $func$
              SELECT NULL::uuid
            $func$;
          CREATE OR REPLACE FUNCTION auth.role() RETURNS text
            LANGUAGE sql STABLE AS $func$
              SELECT NULL::text
            $func$;

          -- Tablas base que las migraciones nuevas referencian via FK.
          -- En la BD real de Supabase ya existen — aqui las creamos
          -- minimas para que CREATE TABLE con FK funcione.
          CREATE TABLE IF NOT EXISTS public.empresas (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            nombre text NOT NULL,
            timezone text DEFAULT 'America/Mexico_City'
          );

          -- Mock COMPLETO de dispositivos con todas las columnas que
          -- las migraciones / vistas referencian. En produccion estas
          -- columnas se agregaron via migrations legacy (saltadas por
          -- baseline). Para el dry-run necesitamos todas presentes.
          CREATE TABLE IF NOT EXISTS public.dispositivos (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            empresa_id uuid REFERENCES public.empresas(id),
            sucursal_id uuid,
            nombre text,
            api_key text,
            activo boolean DEFAULT true,
            ultima_conexion timestamptz,
            version_app text,
            ip_local text,
            notas text,
            heartbeat_at timestamptz,
            hostname text,
            config jsonb DEFAULT '{}'::jsonb,
            creado_por text,
            hwid text,
            ultima_ip text,
            activa boolean DEFAULT true,
            par_codigo text,
            par_expira_en timestamptz,
            empleados_count int DEFAULT 0,
            ultimo_sync_at timestamptz,
            encodings_version int DEFAULT 0,
            camara_ok boolean,
            health_score int DEFAULT 0,
            updated_at timestamptz DEFAULT now()
          );

          CREATE TABLE IF NOT EXISTS public.logs_estacion (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            dispositivo_id uuid REFERENCES public.dispositivos(id),
            empresa_id uuid REFERENCES public.empresas(id),
            tipo text NOT NULL CHECK (tipo = ANY (ARRAY[
              'sync_ok','sync_error','reconocimiento_ok','reconocimiento_fallo',
              'asistencia_registrada','asistencia_offline','camara_error',
              'camara_ok','error','info'
            ])),
            detalle jsonb DEFAULT '{}'::jsonb,
            creado_en timestamptz NOT NULL DEFAULT now()
          );

          CREATE TABLE IF NOT EXISTS public.sucursales (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            empresa_id uuid REFERENCES public.empresas(id),
            nombre text NOT NULL,
            zona text,
            ciudad text,
            activa boolean DEFAULT true
          );

          CREATE TABLE IF NOT EXISTS public.empleados (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            empresa_id uuid REFERENCES public.empresas(id),
            sucursal_id uuid REFERENCES public.sucursales(id),
            nombre text NOT NULL,
            apellido text NOT NULL,
            enrollado boolean DEFAULT false
          );

          CREATE TABLE IF NOT EXISTS public.embeddings_faciales (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            empleado_id uuid REFERENCES public.empleados(id),
            empresa_id uuid REFERENCES public.empresas(id)
          );

          CREATE TABLE IF NOT EXISTS public.registros_asistencia (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            empresa_id uuid REFERENCES public.empresas(id),
            empleado_id uuid REFERENCES public.empleados(id),
            dispositivo_id uuid REFERENCES public.dispositivos(id),
            sucursal_id uuid REFERENCES public.sucursales(id),
            tipo text NOT NULL CHECK (tipo = ANY (ARRAY['entrada','salida'])),
            timestamp timestamptz DEFAULT now(),
            creado_manual boolean DEFAULT false
          );

          CREATE TABLE IF NOT EXISTS public.comandos_estacion (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            dispositivo_id uuid REFERENCES public.dispositivos(id),
            empresa_id uuid REFERENCES public.empresas(id),
            tipo text NOT NULL CHECK (tipo = ANY (ARRAY[
              'sync_empleados','reiniciar_app','limpiar_cache'
            ])),
            payload jsonb DEFAULT '{}'::jsonb,
            creado_en timestamptz NOT NULL DEFAULT now(),
            ejecutado_en timestamptz,
            resultado text
          );

          CREATE TABLE IF NOT EXISTS public.notificaciones (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            empresa_id uuid REFERENCES public.empresas(id),
            tipo text NOT NULL,
            severidad text NOT NULL,
            titulo text NOT NULL,
            creada_en timestamptz NOT NULL DEFAULT now()
          );
          SQL

      - name: Validar orden y nombres de migraciones
        run: |
          set -e
          cd supabase/migrations
          # Cada archivo .sql debe empezar con YYYYMMDD_
          invalid=$(ls *.sql 2>/dev/null | grep -vE '^[0-9]{8}_' || true)
          if [ -n "$invalid" ]; then
            echo "Migraciones con formato invalido (esperado YYYYMMDD_nombre.sql):"
            echo "$invalid"
            exit 1
          fi
          echo "Formato OK: $(ls *.sql | wc -l) migraciones totales"

      - name: Aplicar migraciones NUEVAS en Postgres efimero
        run: |
          set -e
          # Leer baseline (fecha de corte). Las migraciones <= baseline ya
          # estan en produccion y no se re-validan. Solo validamos las
          # nuevas a partir de baseline+1.
          BASELINE=$(cat supabase/migrations/.baseline 2>/dev/null | tr -d '[:space:]' || echo "00000000")
          echo "Baseline: $BASELINE — validando migraciones posteriores"

          NEW_MIGRATIONS=()
          for f in supabase/migrations/*.sql; do
            basename=$(basename "$f")
            datepart="${basename:0:8}"
            # Solo numeros: skip si no parsea como fecha
            if ! [[ "$datepart" =~ ^[0-9]{8}$ ]]; then continue; fi
            # Skip si <= baseline
            if [ "$datepart" -le "$BASELINE" ]; then
              echo "  skip (legacy): $basename"
              continue
            fi
            NEW_MIGRATIONS+=("$f")
          done

          if [ ${#NEW_MIGRATIONS[@]} -eq 0 ]; then
            echo "No hay migraciones nuevas para validar (todas estan en o antes del baseline)."
            exit 0
          fi

          echo ""
          echo "Aplicando ${#NEW_MIGRATIONS[@]} migracion(es) nueva(s):"
          for f in "${NEW_MIGRATIONS[@]}"; do
            echo "─── Aplicando $(basename $f) ───"
            PGPASSWORD=postgres psql -h localhost -U postgres -d testdb -v ON_ERROR_STOP=1 -f "$f" || {
              echo "ERROR aplicando $f"
              exit 1
            }
          done
          echo ""
          echo "Todas las migraciones nuevas aplicadas sin errores."
