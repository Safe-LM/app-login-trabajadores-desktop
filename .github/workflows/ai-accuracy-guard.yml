name: AI Accuracy Guard

# Tras migrar al schema SaaS multitenant, los embeddings y la accuracy
# se validan en runtime por la estacion (genera 10 embeddings/empleado
# y los sube a Supabase). Este workflow queda como manual-only para
# correr pruebas de regresion offline si en el futuro reanudamos un
# dataset estatico de pruebas.

on:
  workflow_dispatch:

jobs:
  accuracy-test:
    name: Verificacion de Modelos (manual)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Skip — placeholder
        run: |
          echo "AI Accuracy Guard ahora corre en la estacion en vivo."
          echo "Si necesitas un test offline, agrega tools/diagnostics/test_accuracy.py"
          echo "y reactiva los triggers (push/pull_request) en este workflow."
