name: Station Build (Windows .exe)

on:
  push:
    tags:
      - 'station-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a buildear (ej. station-v5.0.0)'
        required: false
        default: ''

jobs:
  build-windows:
    name: PyInstaller (Windows x64)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: station

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'station/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build frontend (Vite -> dist)
        working-directory: station/frontend
        run: |
          npm ci
          npm run build

      - name: Build Windows executable
        run: |
          if (Test-Path "build_station.bat") {
            cmd /c build_station.bat
          } else {
            pyinstaller --noconfirm --windowed --name SafeLinkStation `
              --add-data "frontend/dist;frontend/dist" `
              --add-data "src/assets;src/assets" `
              "src/main.py"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeLinkStation-windows
          path: station/dist/**
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/station-v')
        uses: softprops/action-gh-release@v2
        with:
          files: station/dist/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
