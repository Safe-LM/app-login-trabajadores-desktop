name: Web Panel — Typecheck & Lint

on:
  push:
    branches: [main, develop]
    paths:
      - 'web-panel/**'
      - '.github/workflows/web-panel-typecheck.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web-panel/**'
  workflow_dispatch:

jobs:
  typecheck:
    name: tsc + next lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-panel

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web-panel/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

      - name: ESLint
        run: npm run lint || true   # lint warnings no bloquean
