name: SaaS Premium - Quality & Security Guard

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Quality & Style Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          pip install black isort flake8 flake8-bugbear flake8-comprehensions

      - name: Check Imports (isort)
        run: isort --check-only --profile black station/src/ tools/
        continue-on-error: true

      - name: Check Formatting (black)
        run: black --check station/src/ tools/
        continue-on-error: true

      - name: Deep Linting (flake8)
        run: |
          flake8 station/src/ tools/ \
            --count \
            --select=E9,F63,F7,F82,B0,C9 \
            --extend-ignore=B008,B011,B017,B023,B028,B042 \
            --show-source \
            --statistics \
            --max-line-length=120 \
            --exclude=__pycache__,venv,.git

  security:
    name: Advanced Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Security Tools
        run: pip install bandit safety

      - name: Security Scan (Bandit)
        run: |
          echo "Escaneando codigo fuente..."
          bandit -r station/src/ tools/ -ll -ii
          echo "OK"

      - name: Check Dependencies (Safety)
        run: |
          echo "Verificando vulnerabilidades en station/requirements.txt..."
          safety check -r station/requirements.txt || true
          echo "Escaneo finalizado"
